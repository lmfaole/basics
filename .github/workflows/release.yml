name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_current_version:
        description: Publish the current package version if it is not already on npm
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.30.3

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium for Storybook tests
        run: pnpm exec playwright install --with-deps chromium

      - name: Create or update the release pull request
        id: changesets
        uses: changesets/action@v1.7.0
        with:
          version: pnpm version-packages
          commit: "chore: release"
          title: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect release commit
        id: release_commit
        if: steps.changesets.outputs.hasChangesets == 'false'
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          FORCE_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_current_version || 'false' }}
        run: |
          if [ "$FORCE_RELEASE" = "true" ]; then
            echo "is_release_commit=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          HEAD_SUBJECT=$(git log -1 --pretty=%s)

          if [ "$HEAD_SUBJECT" = "chore: release" ]; then
            echo "is_release_commit=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "is_release_commit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PREVIOUS_PACKAGE_JSON=$(git show "${BEFORE_SHA}:package.json" 2>/dev/null || true)
          if [ -z "$PREVIOUS_PACKAGE_JSON" ]; then
            echo "is_release_commit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PREVIOUS_VERSION=$(printf '%s' "$PREVIOUS_PACKAGE_JSON" | node -p "JSON.parse(require('node:fs').readFileSync(0, 'utf8')).version")
          if [ "$PREVIOUS_VERSION" != "$CURRENT_VERSION" ]; then
            echo "is_release_commit=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release_commit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read release metadata
        id: package
        if: steps.release_commit.outputs.is_release_commit == 'true'
        shell: bash
        run: |
          PACKAGE_NAME=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).name")
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          echo "name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check whether the current version is already on npm
        id: publish_check
        if: steps.release_commit.outputs.is_release_commit == 'true'
        shell: bash
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          set +e
          npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry=https://registry.npmjs.org >/tmp/npm-view.out 2>/tmp/npm-view.err
          STATUS=$?
          set -e

          if [ "$STATUS" -eq 0 ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if grep -q "E404" /tmp/npm-view.err || grep -q "404 Not Found" /tmp/npm-view.err; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cat /tmp/npm-view.err
          exit "$STATUS"

      - name: Validate trusted publishing target
        if: steps.publish_check.outputs.should_publish == 'true'
        shell: bash
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
        run: |
          set +e
          npm view "${PACKAGE_NAME}" version --registry=https://registry.npmjs.org >/tmp/npm-package-view.out 2>/tmp/npm-package-view.err
          STATUS=$?
          set -e

          if [ "$STATUS" -eq 0 ]; then
            exit 0
          fi

          if grep -q "E404" /tmp/npm-package-view.err || grep -q "404 Not Found" /tmp/npm-package-view.err; then
            echo "::error::${PACKAGE_NAME} is not available on npm yet. This workflow is configured for trusted publishing only. Configure the package's trusted publisher on npm for release.yml and bootstrap the initial package publish outside this workflow."
            exit 1
          fi

          cat /tmp/npm-package-view.err
          exit "$STATUS"

      - name: Publish package to npm with trusted publishing
        if: steps.publish_check.outputs.should_publish == 'true'
        run: pnpm release

      - name: Verify npm registry has the release version
        if: steps.release_commit.outputs.is_release_commit == 'true'
        shell: bash
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          ATTEMPTS=18
          SLEEP_SECONDS=10

          for attempt in $(seq 1 "$ATTEMPTS"); do
            set +e
            PUBLISHED_VERSION=$(npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry=https://registry.npmjs.org 2>/tmp/npm-sync.err)
            STATUS=$?
            set -e

            if [ "$STATUS" -eq 0 ] && [ "$PUBLISHED_VERSION" = "$PACKAGE_VERSION" ]; then
              exit 0
            fi

            if [ "$attempt" -eq "$ATTEMPTS" ]; then
              cat /tmp/npm-sync.err
              echo "::error::${PACKAGE_NAME}@${PACKAGE_VERSION} is not visible in the npm registry yet. Refusing to create or update the GitHub release until npm catches up."
              exit 1
            fi

            sleep "$SLEEP_SECONDS"
          done

      - name: Pack npm tarball
        if: steps.release_commit.outputs.is_release_commit == 'true'
        run: pnpm pack

      - name: Extract release notes from changelog
        id: release_notes
        if: steps.release_commit.outputs.is_release_commit == 'true'
        shell: bash
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          awk -v version="${PACKAGE_VERSION}" '
            $0 == "## " version {
              capture = 1
            }
            capture && /^## / && $0 != "## " version {
              exit
            }
            capture {
              print
            }
          ' CHANGELOG.md > /tmp/release-notes.md

          if [ ! -s /tmp/release-notes.md ]; then
            echo "::error::Could not extract release notes for version ${PACKAGE_VERSION} from CHANGELOG.md"
            exit 1
          fi

          echo "path=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Ensure git tag exists
        if: steps.release_commit.outputs.is_release_commit == 'true'
        env:
          RELEASE_TAG: ${{ steps.package.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            exit 0
          fi

          if git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            git push origin "refs/tags/${RELEASE_TAG}"
            exit 0
          fi

          git tag "${RELEASE_TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: Create or update GitHub Release
        if: steps.release_commit.outputs.is_release_commit == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.package.outputs.tag }}
          RELEASE_NOTES_FILE: ${{ steps.release_notes.outputs.path }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes-file "${RELEASE_NOTES_FILE}"
            gh release upload "${RELEASE_TAG}" ./*.tgz --clobber
          else
            gh release create "${RELEASE_TAG}" ./*.tgz \
              --title "${RELEASE_TAG}" \
              --notes-file "${RELEASE_NOTES_FILE}"
          fi
