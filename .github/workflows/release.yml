name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium for Storybook tests
        run: pnpm exec playwright install --with-deps chromium

      - name: Create release pull request or publish to npm
        id: changesets
        uses: changesets/action@v1.7.0
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: release"
          title: "chore: release"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Pack npm tarball
        if: steps.changesets.outputs.published == 'true'
        run: pnpm pack

      - name: Upload tarball to GitHub Release
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          if gh release view "v${PACKAGE_VERSION}" >/dev/null 2>&1; then
            gh release upload "v${PACKAGE_VERSION}" ./*.tgz --clobber
          else
            gh release create "v${PACKAGE_VERSION}" ./*.tgz \
              --title "v${PACKAGE_VERSION}" \
              --generate-notes
          fi
